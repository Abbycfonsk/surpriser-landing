<div class="section-head">
  <span>Ads y compras</span>
  <h1>Impulsa tu actividad</h1>
</div>

<div class="pricing-block">
  <h2>Planes para creadores</h2>
  <div class="pricing-grid">
    <button
      class="pricing-card"
      data-action="purchase-plan"
      data-plan="starter"
    >
      <span>Starter</span><strong>9,99€</strong>
      <p>5 anuncios al mes</p>
      <small>Ideal para probar visibilidad.</small>
    </button>

    <button
      class="pricing-card featured"
      data-action="purchase-plan"
      data-plan="pro"
    >
      <span>Pro</span><strong>19,99€</strong>
      <p>12 anuncios al mes</p>
      <small>Más alcance y prioridad.</small>

    <button
      class="pricing-card premium"
      data-action="purchase-plan"
      data-plan="premium"
    >
      <span>Premium</span><strong>39,99€</strong>
      <p>25 anuncios al mes</p>
      <small>Máxima exposición.</small>

  </div>
</div>
